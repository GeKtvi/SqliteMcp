name: CI/CD

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'GitHub Release tag (e.g. v1.0.1). Leave empty for publish artifacts only.'
        required: false
        type: string


jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

  publish:
    needs: test
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            publish_type: aot
          - os: ubuntu-latest
            rid: linux-x64
            publish_type: framework-dependent
          - os: windows-latest
            rid: win-x64
            publish_type: aot
          - os: windows-latest
            rid: win-x64
            publish_type: framework-dependent
          - os: macos-latest
            rid: osx-x64
            publish_type: aot
          - os: macos-latest
            rid: osx-x64
            publish_type: framework-dependent

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish AOT
        if: matrix.publish_type == 'aot'
        run: >
          dotnet publish src/SqliteMcp/SqliteMcp.csproj
          -c Release
          -r ${{ matrix.rid }}
          -o artifacts/publish
          -p:PublishAot=true
          -p:CopyOutputSymbolsToPublishDirectory=false
          --self-contained true

      - name: Publish Framework-Dependent
        if: matrix.publish_type == 'framework-dependent'
        run: >
          dotnet publish src/SqliteMcp/SqliteMcp.csproj
          -c Release
          -r ${{ matrix.rid }}
          -o artifacts/publish
          -p:PublishAot=false
          -p:CopyOutputSymbolsToPublishDirectory=false
          --self-contained false


      - name: Package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $publish = 'artifacts/publish'
          $archive = "mcp-server-${{ matrix.rid }}-${{ matrix.publish_type }}.zip"

          if ($IsWindows) {
            Copy-Item scripts/windows/add-to-path.ps1, scripts/windows/add-to-path.cmd -Destination $publish
          } else {
            Copy-Item scripts/unix/add-to-path.sh -Destination $publish
            & chmod +x (Join-Path $publish 'add-to-path.sh')
            $exe = Join-Path $publish 'SqliteMcp'
            if (Test-Path $exe) { & chmod +x $exe }
          }

          Compress-Archive -Path (Join-Path $publish '*') -DestinationPath $archive -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-server-${{ matrix.rid }}-${{ matrix.publish_type }}
          path: mcp-server-${{ matrix.rid }}-${{ matrix.publish_type }}.zip

  release:
    needs: publish
    if: >
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: mcp-server-*.zip
          generate_release_notes: true
